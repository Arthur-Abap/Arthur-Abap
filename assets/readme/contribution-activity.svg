<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="150" viewBox="0 0 1200 150" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Contribution activity</title>
  <desc id="desc">Header cyber Matrix para a seção de atividade do GitHub visualizada como uma contribution snake.</desc>

  <defs>
    <linearGradient id="panel" x1="76" y1="18" x2="1124" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F14"/>
      <stop offset="0.52" stop-color="#05070A"/>
      <stop offset="1" stop-color="#0A0F14"/>
    </linearGradient>
    <linearGradient id="border" x1="76" y1="18" x2="1124" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#00FF85" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="sweep" x1="-180" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#39FF14" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 75) scale(520 96)">
      <stop stop-color="#39FF14" stop-opacity="0.18"/>
      <stop offset="0.58" stop-color="#00FF85" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#05070A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#39FF14" stroke-opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <clipPath id="panelClip">
      <rect x="76" y="18" width="1048" height="114" rx="12"/>
    </clipPath>
  </defs>

  <style>
    .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .titleText { fill: #F5F7FA; font-size: 31px; font-weight: 850; letter-spacing: 0; }
    .subText { fill: #A8B3C2; font-size: 16px; letter-spacing: 0; }
    .tiny { fill: #39FF14; font-size: 11px; fill-opacity: 0.44; letter-spacing: 0; }
  </style>

  <rect width="1200" height="150" fill="#05070A"/>
  <rect width="1200" height="150" fill="url(#grid)"/>
  <rect width="1200" height="150" fill="url(#coreGlow)"/>

  <g clip-path="url(#panelClip)">
    <rect x="76" y="18" width="1048" height="114" rx="12" fill="url(#panel)" stroke="url(#border)" stroke-width="1.2"/>
    <path d="M76 50H1124M76 92H1124" stroke="#39FF14" stroke-opacity="0.035"/>
    <path d="M-160 19H120" stroke="url(#sweep)" stroke-width="2" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="76 0;1110 0;1110 0" keyTimes="0;0.72;1" dur="8.6s" repeatCount="indefinite"/>
    </path>
    <rect x="76" y="18" width="1048" height="16" fill="#39FF14" opacity="0.025">
      <animate attributeName="y" values="18;126;18" dur="9.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.015;0.052;0.015" dur="9.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="76" y="18" width="1048" height="114" rx="12" fill="none" stroke="url(#border)" stroke-width="1.2"/>
  <path d="M98 34H238M962 34H1102M98 116H206M998 116H1102" stroke="#00FF85" stroke-opacity="0.22"/>
  <path d="M94 30V46M1106 30V46M94 104V120M1106 104V120" stroke="#39FF14" stroke-opacity="0.25"/>

  <g class="mono">
    <text class="titleText" x="126" y="69">// contribution.activity</text>
    <text class="subText" x="128" y="101">GitHub activity visualized as a contribution snake</text>
    <text class="tiny" x="930" y="69">output.branch</text>
    <text class="tiny" x="930" y="92">github-dark.svg</text>
  </g>

  <g fill="#00FF85" filter="url(#glow)">
    <circle cx="102" cy="75" r="3" opacity="0.64">
      <animate attributeName="opacity" values="0.24;0.92;0.24" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="874" cy="57" r="2" opacity="0.40">
      <animate attributeName="opacity" values="0.16;0.78;0.16" dur="4.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1082" cy="83" r="2.4" opacity="0.48">
      <animate attributeName="opacity" values="0.72;0.18;0.72" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="714" cy="108" r="1.8" opacity="0.34">
      <animate attributeName="opacity" values="0.14;0.70;0.14" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#39FF14" fill-opacity="0.20">
    <rect x="802" y="52" width="7" height="7" rx="1"/>
    <rect x="817" y="52" width="7" height="7" rx="1"/>
    <rect x="832" y="52" width="7" height="7" rx="1"/>
    <rect x="847" y="52" width="7" height="7" rx="1"/>
    <rect x="817" y="67" width="7" height="7" rx="1"/>
    <rect x="832" y="67" width="7" height="7" rx="1"/>
    <rect x="847" y="67" width="7" height="7" rx="1"/>
    <rect x="862" y="67" width="7" height="7" rx="1"/>
    <rect x="832" y="82" width="7" height="7" rx="1"/>
    <rect x="847" y="82" width="7" height="7" rx="1"/>
    <rect x="862" y="82" width="7" height="7" rx="1"/>
    <rect x="877" y="82" width="7" height="7" rx="1"/>
  </g>
</svg>
