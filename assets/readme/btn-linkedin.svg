<svg xmlns="http://www.w3.org/2000/svg" width="320" height="42" viewBox="0 0 320 42" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">LinkedIn Arthur Medeiros</title>
  <desc id="desc">Botão visual para abrir o LinkedIn de Arthur Medeiros.</desc>
  <defs>
    <linearGradient id="fill" x1="0" y1="0" x2="320" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18181E"/>
      <stop offset="1" stop-color="#0A0A0C"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-80%" width="140%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="318" height="40" rx="12" fill="url(#fill)" stroke="#C8F135" stroke-opacity="0.45"/>
  <path d="M18 29V17M18 13v-.2M27 29v-8.2c0-4.2 6-4.7 6 0V29" fill="none" stroke="#C8F135" stroke-width="2.2" stroke-linecap="round"/>
  <text x="50" y="27" fill="#F4F4F5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="750">LinkedIn → Arthur Medeiros</text>
  <path d="M228 40H292" stroke="#39FF14" stroke-opacity="0.5" stroke-width="1.4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.8s" repeatCount="indefinite"/>
  </path>
</svg>
