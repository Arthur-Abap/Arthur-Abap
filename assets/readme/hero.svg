<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="620" viewBox="0 0 1200 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Arthur Medeiros - Systems, QA, Automations and AI</title>
  <desc id="desc">Hero em estilo terminal cyber premium com grade sutil, chuva Matrix discreta, nome Arthur Medeiros e um núcleo digital abstrato.</desc>

  <defs>
    <linearGradient id="shell" x1="60" y1="44" x2="1140" y2="576" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18181E"/>
      <stop offset="0.48" stop-color="#0F0F14"/>
      <stop offset="1" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="border" x1="52" y1="48" x2="1148" y2="574" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8F135" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#39FF14" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#C8F135" stop-opacity="0.34"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 292) rotate(90) scale(258)">
      <stop stop-color="#39FF14" stop-opacity="0.38"/>
      <stop offset="0.38" stop-color="#C8F135" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0A0A0C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(236 170) rotate(90) scale(260 420)">
      <stop stop-color="#C8F135" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0A0A0C" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.784 0 0 0 0 0.945 0 0 0 0 0.208 0 0 0 0.34 0"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <filter id="tightGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 H 0 V 48" fill="none" stroke="#C8F135" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="fineGrid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 H 0 V 12" fill="none" stroke="#39FF14" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <clipPath id="frameClip">
      <rect x="50" y="38" width="1100" height="544" rx="32"/>
    </clipPath>
    <linearGradient id="scanLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#C8F135" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .rain { fill: #39FF14; fill-opacity: .16; font-family: "JetBrains Mono", Consolas, monospace; font-size: 13px; }
    .muted { fill: #A1A1AA; }
  </style>

  <rect width="1200" height="620" fill="#0A0A0C"/>
  <rect width="1200" height="620" fill="url(#grid)"/>
  <rect width="1200" height="620" fill="url(#fineGrid)"/>
  <rect width="1200" height="620" fill="url(#leftGlow)"/>
  <rect width="1200" height="620" fill="url(#coreGlow)"/>

  <g clip-path="url(#frameClip)">
    <g opacity="0.48">
      <g>
        <text class="rain" x="74" y="-20">01</text>
        <text class="rain" x="126" y="18">QA</text>
        <text class="rain" x="212" y="-8">API</text>
        <text class="rain" x="316" y="28">AI</text>
        <text class="rain" x="734" y="-14">ERP</text>
        <text class="rain" x="1018" y="16">0101</text>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 190; 0 0" dur="18s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.72">
        <text class="rain" x="96" y="126">sync</text>
        <text class="rain" x="176" y="170">001</text>
        <text class="rain" x="636" y="112">test</text>
        <text class="rain" x="790" y="152">ABAP</text>
        <text class="rain" x="1034" y="122">run</text>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 140; 0 0" dur="22s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.5">
        <text class="rain" x="284" y="354">Omie</text>
        <text class="rain" x="514" y="380">SQL</text>
        <text class="rain" x="824" y="344">node</text>
        <text class="rain" x="970" y="398">agent</text>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -120; 0 0" dur="24s" repeatCount="indefinite"/>
      </g>
    </g>

    <rect x="50" y="38" width="1100" height="544" rx="32" fill="url(#shell)" fill-opacity="0.82" stroke="url(#border)" stroke-width="1.4"/>
    <rect x="78" y="66" width="1044" height="488" rx="24" fill="#0A0A0C" fill-opacity="0.48" stroke="#C8F135" stroke-opacity="0.08"/>

    <g opacity="0.35">
      <path d="M78 132H448" stroke="#C8F135" stroke-opacity="0.24"/>
      <path d="M78 445H650" stroke="#C8F135" stroke-opacity="0.12"/>
      <path d="M748 96H1086" stroke="#C8F135" stroke-opacity="0.12"/>
      <path d="M118 500H1080" stroke="url(#scanLine)" stroke-width="1.2">
        <animate attributeName="opacity" values="0.12;0.65;0.12" dur="6s" repeatCount="indefinite"/>
      </path>
    </g>

    <g class="mono">
      <text x="104" y="126" fill="#C8F135" font-size="17">// profile.boot</text>
      <text x="104" y="183" fill="#F4F4F5" font-size="62" font-weight="800">Arthur Medeiros<tspan fill="#C8F135">_<animate attributeName="opacity" values="1;0.12;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>
      <text x="106" y="229" fill="#C8F135" font-size="26" font-weight="700">Systems • QA • Automations • AI</text>
      <text x="106" y="284" fill="#F4F4F5" font-size="17">&gt; building practical systems with automation,</text>
      <text x="106" y="310" fill="#F4F4F5" font-size="17">  integration and AI</text>
      <text x="106" y="346" fill="#A1A1AA" font-size="18">Estudante de Análise e Desenvolvimento de Sistemas, criando</text>
      <text x="106" y="374" fill="#A1A1AA" font-size="18">soluções para processos reais com APIs, ERP, QA e IA.</text>
    </g>

    <g class="mono" font-size="14" font-weight="700">
      <rect x="106" y="398" width="130" height="38" rx="19" fill="#18181E" stroke="#C8F135" stroke-opacity="0.28"/>
      <circle cx="128" cy="417" r="4" fill="#39FF14" filter="url(#tightGlow)"/>
      <text x="144" y="422" fill="#F4F4F5">QA minded</text>
      <rect x="250" y="398" width="170" height="38" rx="19" fill="#18181E" stroke="#C8F135" stroke-opacity="0.28"/>
      <text x="272" y="422" fill="#F4F4F5">ERP/API flows</text>
      <rect x="434" y="398" width="174" height="38" rx="19" fill="#18181E" stroke="#C8F135" stroke-opacity="0.28"/>
      <text x="456" y="422" fill="#F4F4F5">AI experiments</text>
    </g>

    <g transform="translate(748 104)">
      <rect x="0" y="0" width="338" height="382" rx="26" fill="#101015" stroke="#C8F135" stroke-opacity="0.25"/>
      <rect x="20" y="20" width="298" height="342" rx="22" fill="#0A0A0C" stroke="#39FF14" stroke-opacity="0.14"/>
      <circle cx="169" cy="180" r="116" fill="#39FF14" fill-opacity="0.045"/>
      <circle cx="169" cy="180" r="86" fill="none" stroke="#C8F135" stroke-opacity="0.34" stroke-width="1.4" filter="url(#softGlow)">
        <animate attributeName="r" values="82;88;82" dur="5.8s" repeatCount="indefinite"/>
      </circle>
      <ellipse cx="169" cy="180" rx="104" ry="36" fill="none" stroke="#39FF14" stroke-opacity="0.26"/>
      <ellipse cx="169" cy="180" rx="104" ry="36" fill="none" stroke="#39FF14" stroke-opacity="0.18" transform="rotate(58 169 180)"/>
      <ellipse cx="169" cy="180" rx="104" ry="36" fill="none" stroke="#39FF14" stroke-opacity="0.18" transform="rotate(-58 169 180)"/>
      <path d="M169 64V296" stroke="#C8F135" stroke-opacity="0.12"/>
      <path d="M53 180H285" stroke="#C8F135" stroke-opacity="0.12"/>

      <g>
        <circle cx="169" cy="76" r="4" fill="#C8F135" filter="url(#tightGlow)"/>
        <circle cx="266" cy="180" r="4" fill="#39FF14" filter="url(#tightGlow)"/>
        <circle cx="108" cy="246" r="4" fill="#C8F135" filter="url(#tightGlow)"/>
        <animateTransform attributeName="transform" type="rotate" from="0 169 180" to="360 169 180" dur="18s" repeatCount="indefinite"/>
      </g>

      <g class="mono">
        <rect x="88" y="130" width="162" height="118" rx="16" fill="#18181E" stroke="#C8F135" stroke-opacity="0.32"/>
        <rect x="88" y="130" width="162" height="30" rx="16" fill="#101015"/>
        <circle cx="106" cy="145" r="3.5" fill="#C8F135"/>
        <circle cx="121" cy="145" r="3.5" fill="#39FF14" fill-opacity="0.62"/>
        <circle cx="136" cy="145" r="3.5" fill="#A1A1AA" fill-opacity="0.4"/>
        <text x="108" y="185" fill="#C8F135" font-size="14" font-weight="700">$ automate</text>
        <path d="M108 207H174" stroke="#39FF14" stroke-opacity="0.75" stroke-width="4" stroke-linecap="round"/>
        <path d="M108 228H220" stroke="#C8F135" stroke-opacity="0.38" stroke-width="4" stroke-linecap="round"/>
      </g>

      <g opacity="0.7" filter="url(#tightGlow)">
        <path d="M34 72H82V112" fill="none" stroke="#39FF14" stroke-opacity="0.44"/>
        <path d="M304 300H256V252" fill="none" stroke="#39FF14" stroke-opacity="0.44"/>
        <path d="M42 310L86 266" stroke="#C8F135" stroke-opacity="0.22"/>
        <path d="M296 68L252 112" stroke="#C8F135" stroke-opacity="0.22"/>
      </g>
    </g>
  </g>
</svg>
