<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="86" viewBox="0 0 1200 86" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Divisor cyber Matrix</title>
  <desc id="desc">Linha divisória tecnológica com glow central, partículas e brilho horizontal sutil.</desc>
  <defs>
    <linearGradient id="line" x1="84" y1="43" x2="1116" y2="43" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#0DBF66" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#00FF85" stop-opacity="0.9"/>
      <stop offset="0.82" stop-color="#0DBF66" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pulse" x1="-140" y1="43" x2="0" y2="43" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#39FF14" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-5%" y="-240%" width="110%" height="580%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="86" fill="#05070A"/>
  <path d="M84 43H1116" stroke="url(#line)" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M152 36H312M888 50H1048" stroke="#0DBF66" stroke-opacity="0.20" stroke-width="1"/>
  <path d="M-120 43H20" stroke="url(#pulse)" stroke-width="2" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="100 0;1200 0;1200 0" keyTimes="0;0.78;1" dur="7.2s" repeatCount="indefinite"/>
  </path>
  <path d="M514 34H686M552 52H648" stroke="#00FF85" stroke-opacity="0.34" stroke-width="1"/>
  <g font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#39FF14" fill-opacity="0.34">
    <text x="146" y="34">0101</text>
    <text x="992" y="58">run</text>
    <text x="566" y="29">sync</text>
  </g>
  <g fill="#00FF85" filter="url(#glow)">
    <circle cx="600" cy="43" r="4">
      <animate attributeName="r" values="3;6;3" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.36;1;0.36" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="43" r="2" opacity="0.45">
      <animate attributeName="opacity" values="0.12;0.72;0.12" dur="5.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="842" cy="43" r="2" opacity="0.45">
      <animate attributeName="opacity" values="0.72;0.12;0.72" dur="5.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
