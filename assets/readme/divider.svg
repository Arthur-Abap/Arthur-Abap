<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="86" viewBox="0 0 1200 86" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Divisor neon</title>
  <desc id="desc">Linha divisória neon com brilho central e pequenas partículas em estilo terminal.</desc>
  <defs>
    <linearGradient id="line" x1="84" y1="43" x2="1116" y2="43" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#C8F135" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#C8F135" stop-opacity="0.8"/>
      <stop offset="0.82" stop-color="#C8F135" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-5%" y="-200%" width="110%" height="500%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>
  <rect width="1200" height="86" fill="#0A0A0C"/>
  <path d="M84 43H1116" stroke="url(#line)" stroke-width="1.4" filter="url(#glow)"/>
  <path d="M482 43H718" stroke="#C8F135" stroke-opacity="0.52" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.18;0.72;0.18" dur="4.6s" repeatCount="indefinite"/>
  </path>
  <g font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#39FF14" fill-opacity="0.38">
    <text x="146" y="34">0101</text>
    <text x="996" y="58">run</text>
    <text x="564" y="30">sync</text>
  </g>
  <circle cx="600" cy="43" r="4" fill="#C8F135" filter="url(#glow)">
    <animate attributeName="r" values="3;6;3" dur="4.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4.6s" repeatCount="indefinite"/>
  </circle>
</svg>
