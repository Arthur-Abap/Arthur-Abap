<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="560" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Projetos em destaque de Arthur Medeiros</title>
  <desc id="desc">Grade com projetos públicos: Oráculo Central de Demandas, Forge Gym MVP e Projeto IA Agentes.</desc>

  <defs>
    <linearGradient id="card" x1="76" y1="132" x2="1124" y2="516" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111820"/>
      <stop offset="0.58" stop-color="#0A0F14"/>
      <stop offset="1" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="stroke" x1="76" y1="132" x2="1124" y2="516" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0.34"/>
      <stop offset="0.52" stop-color="#00FF85" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="sweep" x1="-180" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00FF85" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00FF85" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00FF85" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="projectGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(214 146) rotate(90) scale(220 520)">
      <stop stop-color="#00FF85" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#05070A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-35%" y="-50%" width="170%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#39FF14" stroke-opacity="0.03"/>
    </pattern>
  </defs>

  <style>
    .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { fill: #F5F7FA; font-size: 24px; font-weight: 850; }
    .desc { fill: #A8B3C2; font-size: 17px; }
    .tag { fill: #F5F7FA; font-size: 13px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    .icon { fill: none; stroke: #00FF85; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1200" height="560" fill="#05070A"/>
  <rect width="1200" height="560" fill="url(#grid)"/>
  <rect width="1200" height="560" fill="url(#projectGlow)"/>

  <path d="M92 120H314V92H442M1018 98V132H1114M86 548H230V520" fill="none" stroke="#00FF85" stroke-opacity="0.10"/>
  <circle cx="442" cy="92" r="3" fill="#39FF14" opacity="0.36"/>
  <circle cx="1114" cy="132" r="3" fill="#00FF85" opacity="0.30"/>

  <text class="mono" x="76" y="64" fill="#00FF85" font-size="16">// featured.projects</text>
  <text class="sans" x="76" y="104" fill="#F5F7FA" font-size="34" font-weight="850">Projetos em destaque</text>

  <g class="sans">
    <g transform="translate(76 136)">
      <rect width="512" height="174" rx="14" fill="url(#card)" stroke="url(#stroke)" stroke-width="1.1"/>
      <path d="M0 0H512" stroke="#39FF14" stroke-opacity="0.08"/>
      <path d="M-170 1H90" stroke="url(#sweep)" stroke-width="2">
        <animateTransform attributeName="transform" type="translate" values="0 0;650 0;650 0" keyTimes="0;0.72;1" dur="7.8s" repeatCount="indefinite"/>
      </path>
      <rect x="28" y="28" width="48" height="48" rx="10" fill="#0A0F14" stroke="#00FF85" stroke-opacity="0.24"/>
      <path class="icon" d="M40 40h24v24H40zM45 47h14M45 55h14">
        <animate attributeName="opacity" values="0.58;1;0.58" dur="4.2s" repeatCount="indefinite"/>
      </path>
      <text class="title" x="96" y="49">Oráculo — Central de Demandas</text>
      <text class="desc" x="28" y="103">Sistema para gestão e acompanhamento de</text>
      <text class="desc" x="28" y="128">demandas com automações e integrações.</text>
      <g class="mono tag" transform="translate(28 144)">
        <rect width="72" height="26" rx="8" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/><text x="36" y="14">Next.js</text>
        <rect x="82" width="94" height="26" rx="8" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/><text x="129" y="14">TypeScript</text>
        <rect x="186" width="72" height="26" rx="8" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/><text x="222" y="14">Prisma</text>
      </g>
    </g>

    <g transform="translate(612 136)">
      <rect width="512" height="174" rx="14" fill="url(#card)" stroke="url(#stroke)" stroke-width="1.1"/>
      <path d="M0 0H512" stroke="#39FF14" stroke-opacity="0.08"/>
      <path d="M-185 1H88" stroke="url(#sweep)" stroke-width="2">
        <animateTransform attributeName="transform" type="translate" values="0 0;660 0;660 0" keyTimes="0;0.72;1" dur="8.4s" repeatCount="indefinite"/>
      </path>
      <rect x="28" y="28" width="48" height="48" rx="10" fill="#0A0F14" stroke="#00FF85" stroke-opacity="0.24"/>
      <path class="icon" d="M42 52h20M42 46h20M39 44v10M65 44v10M47 40h10M47 58h10">
        <animate attributeName="opacity" values="0.56;1;0.56" dur="4.6s" repeatCount="indefinite"/>
      </path>
      <text class="title" x="96" y="49">Forge Gym MVP</text>
      <text class="desc" x="28" y="103">MVP de plataforma fitness com treinos, usuários</text>
      <text class="desc" x="28" y="128">e progressão.</text>
      <g class="mono tag" transform="translate(28 144)">
        <rect width="72" height="26" rx="8" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/><text x="36" y="14">Next.js</text>
        <rect x="82" width="84" height="26" rx="8" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/><text x="124" y="14">Tailwind</text>
        <rect x="176" width="104" height="26" rx="8" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/><text x="228" y="14">PostgreSQL</text>
      </g>
    </g>

    <g transform="translate(76 340)">
      <rect width="1048" height="174" rx="14" fill="url(#card)" stroke="url(#stroke)" stroke-width="1.1"/>
      <path d="M0 0H512" stroke="#39FF14" stroke-opacity="0.08"/>
      <path d="M-170 1H90" stroke="url(#sweep)" stroke-width="2">
        <animateTransform attributeName="transform" type="translate" values="0 0;1180 0;1180 0" keyTimes="0;0.72;1" dur="8.8s" repeatCount="indefinite"/>
      </path>
      <rect x="28" y="28" width="48" height="48" rx="10" fill="#0A0F14" stroke="#00FF85" stroke-opacity="0.24"/>
      <circle class="icon" cx="52" cy="40" r="4"/>
      <circle class="icon" cx="41" cy="59" r="4"/>
      <circle class="icon" cx="63" cy="59" r="4"/>
      <path class="icon" d="M50 44l-7 11M54 44l7 11M45 59h14"/>
      <circle cx="52" cy="40" r="3" fill="#39FF14" filter="url(#glow)">
        <animate attributeName="opacity" values="0.58;1;0.58" dur="5s" repeatCount="indefinite"/>
      </circle>
      <text class="title" x="96" y="49">Projeto IA Agentes</text>
      <text class="desc" x="28" y="103">Estudos e protótipos de agentes inteligentes com IA generativa</text>
      <text class="desc" x="28" y="128">para automação.</text>
      <g class="mono tag" transform="translate(28 144)">
        <rect width="68" height="26" rx="8" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/><text x="34" y="14">Python</text>
        <rect x="78" width="72" height="26" rx="8" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/><text x="114" y="14">Ollama</text>
        <rect x="160" width="72" height="26" rx="8" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/><text x="196" y="14">Claude</text>
      </g>
    </g>
  </g>

  <path d="M78 530H1122" stroke="#00FF85" stroke-opacity="0.10"/>
  <circle cx="214" cy="530" r="3" fill="#39FF14" filter="url(#glow)">
    <animate attributeName="cx" values="214;990;214" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.95;0.2" dur="12s" repeatCount="indefinite"/>
  </circle>
</svg>
