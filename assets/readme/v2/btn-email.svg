<svg xmlns="http://www.w3.org/2000/svg" width="350" height="42" viewBox="0 0 350 42" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Enviar e-mail para Arthur Medeiros</title>
  <desc id="desc">Botão visual em estilo terminal cyber com o e-mail arthurmedeiros08@gmail.com.</desc>
  <defs>
    <linearGradient id="buttonFill" x1="0" y1="0" x2="350" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111820"/>
      <stop offset="1" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="edgeGlow" x1="0" y1="21" x2="350" y2="21" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#00FF85" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="sweep" x1="-90" y1="0" x2="30" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00FF85" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00FF85" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#00FF85" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-120%" width="140%" height="340%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="348" height="40" rx="10" fill="url(#buttonFill)" stroke="url(#edgeGlow)" stroke-width="1"/>
  <rect x="9" y="7" width="332" height="28" rx="7" fill="#0A0F14" fill-opacity="0.34" stroke="#39FF14" stroke-opacity="0.08"/>
  <path d="M-60 5H50V37H-60Z" fill="url(#sweep)" opacity="0.78">
    <animateTransform attributeName="transform" type="translate" values="0 0;405 0;405 0" keyTimes="0;0.72;1" dur="6.1s" repeatCount="indefinite"/>
  </path>
  <g transform="translate(15 12)" fill="none" stroke="#39FF14" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <rect x="0" y="2" width="22" height="16" rx="3" stroke-opacity="0.72"/>
    <path d="M2 4l9 7 9-7"/>
    <path d="M2 18l6.6-5.6M20 18l-6.6-5.6" stroke-opacity="0.56"/>
    <animate attributeName="opacity" values="0.72;1;0.72" dur="4.8s" repeatCount="indefinite"/>
  </g>
  <text x="50" y="27" fill="#F5F7FA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="750">arthurmedeiros08@gmail.com</text>
  <path d="M264 40H324" stroke="#00FF85" stroke-opacity="0.46" stroke-width="1.3" filter="url(#glow)">
    <animate attributeName="opacity" values="0.18;0.88;0.18" dur="4.2s" repeatCount="indefinite"/>
  </path>
</svg>
