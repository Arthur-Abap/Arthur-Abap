<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="620" viewBox="0 0 1200 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Arthur Medeiros - Systems, QA, Automations and AI</title>
  <desc id="desc">Hero em estilo Matrix cyber premium com terminal, chuva de dados discreta, circuitos sutis e núcleo digital animado.</desc>

  <defs>
    <linearGradient id="heroShell" x1="52" y1="38" x2="1148" y2="582" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111820"/>
      <stop offset="0.52" stop-color="#0A0F14"/>
      <stop offset="1" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="heroStroke" x1="52" y1="38" x2="1148" y2="582" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0.42"/>
      <stop offset="0.52" stop-color="#00FF85" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="scanBeam" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00FF85" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="leftAura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 188) rotate(90) scale(250 460)">
      <stop stop-color="#00FF85" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#05070A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreAura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(924 296) rotate(90) scale(260)">
      <stop stop-color="#39FF14" stop-opacity="0.28"/>
      <stop offset="0.38" stop-color="#00FF85" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#05070A" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <filter id="tightGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#39FF14" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="microGrid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M12 0H0V12" fill="none" stroke="#00FF85" stroke-opacity="0.018" stroke-width="1"/>
    </pattern>
    <clipPath id="frameClip">
      <rect x="50" y="38" width="1100" height="544" rx="32"/>
    </clipPath>
  </defs>

  <style>
    .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .rain { fill: #39FF14; fill-opacity: .14; font-family: "JetBrains Mono", Consolas, monospace; font-size: 13px; }
    .muted { fill: #A8B3C2; }
  </style>

  <rect width="1200" height="620" fill="#05070A"/>
  <rect width="1200" height="620" fill="url(#grid)"/>
  <rect width="1200" height="620" fill="url(#microGrid)"/>
  <rect width="1200" height="620" fill="url(#leftAura)"/>
  <rect width="1200" height="620" fill="url(#coreAura)"/>

  <g clip-path="url(#frameClip)">
    <g opacity="0.64">
      <g>
        <text class="rain" x="78" y="-42">0101</text>
        <text class="rain" x="144" y="12">QA</text>
        <text class="rain" x="236" y="-8">API</text>
        <text class="rain" x="346" y="36">AI</text>
        <text class="rain" x="674" y="-18">ERP</text>
        <text class="rain" x="1012" y="16">sync</text>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 210;0 0" dur="24s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.78">
        <text class="rain" x="100" y="132">run</text>
        <text class="rain" x="184" y="180">001</text>
        <text class="rain" x="620" y="112">test</text>
        <text class="rain" x="792" y="152">ABAP</text>
        <text class="rain" x="1040" y="132">node</text>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 150;0 0" dur="28s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.52">
        <text class="rain" x="296" y="376">Omie</text>
        <text class="rain" x="508" y="394">SQL</text>
        <text class="rain" x="818" y="356">agent</text>
        <text class="rain" x="980" y="410">flow</text>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -135;0 0" dur="30s" repeatCount="indefinite"/>
      </g>
    </g>

    <rect x="50" y="38" width="1100" height="544" rx="32" fill="url(#heroShell)" fill-opacity="0.88" stroke="url(#heroStroke)" stroke-width="1.4"/>
    <rect x="78" y="66" width="1044" height="488" rx="24" fill="#05070A" fill-opacity="0.54" stroke="#39FF14" stroke-opacity="0.10"/>

    <g opacity="0.54">
      <path d="M78 132H452" stroke="#39FF14" stroke-opacity="0.18"/>
      <path d="M78 446H650" stroke="#00FF85" stroke-opacity="0.12"/>
      <path d="M748 96H1088" stroke="#39FF14" stroke-opacity="0.12"/>
      <path d="M118 510H1084" stroke="url(#scanBeam)" stroke-width="1.2">
        <animate attributeName="opacity" values="0.10;0.72;0.10" dur="7s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="-120 0;120 0;-120 0" dur="7s" repeatCount="indefinite"/>
      </path>
      <path d="M150 476H245V432H322" fill="none" stroke="#00FF85" stroke-opacity="0.18"/>
      <path d="M958 104V150H1048" fill="none" stroke="#00FF85" stroke-opacity="0.16"/>
      <circle cx="322" cy="432" r="3" fill="#00FF85" opacity="0.55"/>
      <circle cx="1048" cy="150" r="3" fill="#39FF14" opacity="0.45"/>
    </g>

    <g class="mono">
      <text x="104" y="126" fill="#00FF85" font-size="17">// profile.boot</text>
      <text x="104" y="184" fill="#F5F7FA" font-size="62" font-weight="800">Arthur Medeiros<tspan fill="#39FF14">_<animate attributeName="opacity" values="1;0.12;1" dur="1.08s" repeatCount="indefinite"/></tspan></text>
      <text x="106" y="230" fill="#00FF85" font-size="26" font-weight="700">Systems • QA • Automations • AI</text>
      <text x="106" y="280" fill="#F5F7FA" font-size="16">
        <tspan x="106" dy="0">&gt; building practical systems with automation,</tspan>
        <tspan x="106" dy="24">integration and AI</tspan>
      </text>
      <text x="106" y="346" fill="#A8B3C2" font-size="18">
        <tspan x="106" dy="0">Estudante de Análise e Desenvolvimento de Sistemas,</tspan>
        <tspan x="106" dy="26">criando soluções para processos reais com APIs,</tspan>
        <tspan x="106" dy="26">ERP, QA e IA.</tspan>
      </text>
    </g>

    <g class="mono" font-size="14" font-weight="700">
      <g transform="translate(106 430)">
        <rect width="132" height="38" rx="12" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.22"/>
        <circle cx="22" cy="19" r="4" fill="#39FF14" filter="url(#tightGlow)">
          <animate attributeName="opacity" values="0.45;1;0.45" dur="3.8s" repeatCount="indefinite"/>
        </circle>
        <text x="38" y="24" fill="#F5F7FA">QA mindset</text>
      </g>
      <g transform="translate(252 430)">
        <rect width="158" height="38" rx="12" fill="#0E141B" stroke="#00FF85" stroke-opacity="0.20"/>
        <circle cx="22" cy="19" r="3" fill="none" stroke="#00FF85" stroke-width="1.8"/>
        <circle cx="38" cy="12" r="3" fill="none" stroke="#00FF85" stroke-width="1.8"/>
        <circle cx="38" cy="26" r="3" fill="none" stroke="#00FF85" stroke-width="1.8"/>
        <path d="M25 18l10-5M25 20l10 5" fill="none" stroke="#00FF85" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <animate attributeName="opacity" values="0.56;1;0.56" dur="4.6s" repeatCount="indefinite"/>
        </path>
        <text x="50" y="24" fill="#F5F7FA">ERP/API flow</text>
      </g>
      <g transform="translate(424 430)">
        <rect width="192" height="38" rx="12" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.20"/>
        <path d="M31 11v18M22 20h18M25 14l12 12M37 14L25 26" fill="none" stroke="#00FF85" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <animate attributeName="opacity" values="0.52;1;0.52" dur="5s" repeatCount="indefinite"/>
        </path>
        <text x="48" y="24" fill="#F5F7FA">AI experiments</text>
      </g>
    </g>

    <g transform="translate(748 104)">
      <rect width="338" height="382" rx="26" fill="#0A0F14" stroke="#39FF14" stroke-opacity="0.22"/>
      <rect x="20" y="20" width="298" height="342" rx="22" fill="#05070A" stroke="#00FF85" stroke-opacity="0.13"/>
      <path d="M44 70H84V110M294 304H254V262M46 310L88 268M292 72L250 114" fill="none" stroke="#00FF85" stroke-opacity="0.24">
        <animate attributeName="stroke-opacity" values="0.12;0.32;0.12" dur="6.8s" repeatCount="indefinite"/>
      </path>
      <circle cx="169" cy="180" r="126" fill="#39FF14" fill-opacity="0.035"/>
      <circle cx="169" cy="180" r="94" fill="none" stroke="#39FF14" stroke-opacity="0.34" stroke-width="1.3" filter="url(#softGlow)">
        <animate attributeName="r" values="89;98;89" dur="6.2s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0.18;0.42;0.18" dur="6.2s" repeatCount="indefinite"/>
      </circle>
      <g opacity="0.76">
        <ellipse cx="169" cy="180" rx="108" ry="36" fill="none" stroke="#00FF85" stroke-opacity="0.28"/>
        <ellipse cx="169" cy="180" rx="108" ry="36" fill="none" stroke="#39FF14" stroke-opacity="0.18" transform="rotate(60 169 180)"/>
        <ellipse cx="169" cy="180" rx="108" ry="36" fill="none" stroke="#39FF14" stroke-opacity="0.18" transform="rotate(-60 169 180)"/>
        <animateTransform attributeName="transform" type="rotate" from="0 169 180" to="360 169 180" dur="32s" repeatCount="indefinite"/>
      </g>
      <path d="M169 60V300M49 180H289" stroke="#39FF14" stroke-opacity="0.10"/>

      <g fill="#00FF85" filter="url(#tightGlow)" opacity="0.42">
        <circle cx="169" cy="86" r="2.2"/>
        <circle cx="250" cy="227" r="2.2"/>
        <circle cx="88" cy="227" r="2.2"/>
        <animateTransform attributeName="transform" type="rotate" from="0 169 180" to="-360 169 180" dur="28s" repeatCount="indefinite"/>
      </g>

      <g>
        <circle cx="169" cy="86" r="4" fill="#39FF14" filter="url(#tightGlow)"/>
        <circle cx="263" cy="180" r="4" fill="#00FF85" filter="url(#tightGlow)"/>
        <circle cx="122" cy="261" r="4" fill="#39FF14" filter="url(#tightGlow)"/>
        <animateTransform attributeName="transform" type="rotate" from="0 169 180" to="360 169 180" dur="18s" repeatCount="indefinite"/>
      </g>

      <g class="mono">
        <rect x="86" y="121" width="166" height="118" rx="16" fill="#0E141B" stroke="#39FF14" stroke-opacity="0.28"/>
        <rect x="86" y="121" width="166" height="30" rx="16" fill="#111820"/>
        <circle cx="105" cy="136" r="3.5" fill="#39FF14"/>
        <circle cx="121" cy="136" r="3.5" fill="#00FF85" fill-opacity="0.74"/>
        <circle cx="137" cy="136" r="3.5" fill="#7E8A98" fill-opacity="0.55"/>
        <text x="108" y="176" fill="#00FF85" font-size="14" font-weight="700">$ automate</text>
        <path d="M108 199H174" stroke="#39FF14" stroke-opacity="0.72" stroke-width="4" stroke-linecap="round">
          <animate attributeName="stroke-opacity" values="0.28;0.82;0.28" dur="4.4s" repeatCount="indefinite"/>
        </path>
        <path d="M108 219H220" stroke="#00FF85" stroke-opacity="0.34" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>
  </g>
</svg>
