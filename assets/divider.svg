<svg width="1200" height="60" viewBox="0 0 1200 60" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Matrix neon divider</title>
  <desc id="desc">A subtle neon green divider line with terminal inspired dots and code fragments.</desc>
  <defs>
    <linearGradient id="line" x1="80" y1="30" x2="1120" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#39FF14" stop-opacity="0.45"/>
      <stop offset="0.50" stop-color="#00FF88" stop-opacity="1"/>
      <stop offset="0.82" stop-color="#39FF14" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 30) scale(190 28)">
      <stop offset="0" stop-color="#39FF14" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#030B07" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1200" height="60" fill="transparent"/>
  <ellipse cx="600" cy="30" rx="190" ry="28" fill="url(#glow)"/>
  <path d="M80 30H1120" stroke="url(#line)" stroke-width="2"/>
  <path d="M478 30H722" stroke="#39FF14" stroke-width="4" stroke-linecap="round" opacity="0.26" filter="url(#soft)"/>
  <circle cx="430" cy="30" r="3" fill="#39FF14" opacity="0.75"/>
  <circle cx="462" cy="30" r="2" fill="#00FF88" opacity="0.65"/>
  <circle cx="738" cy="30" r="2" fill="#00FF88" opacity="0.65"/>
  <circle cx="770" cy="30" r="3" fill="#39FF14" opacity="0.75"/>
  <g font-family="JetBrains Mono, Consolas, Monaco, monospace" font-size="12" fill="#39FF14" opacity="0.34">
    <text x="116" y="25">0101</text>
    <text x="178" y="39">run --profile</text>
    <text x="902" y="25">build()</text>
    <text x="1008" y="39">1010</text>
  </g>
</svg>
