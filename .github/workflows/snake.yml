name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # Gera os SVGs da snake contribution e publica na branch output.
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: arthur-abap
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#39FF14&color_dots=#030B07,#07110D,#0A1510,#00FF88,#39FF14

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
